apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-core
  namespace: uzo-production
spec:
  replicas: 5
  selector:
    matchLabels:
      app: atlas-core
  template:
    metadata:
      labels:
        app: atlas-core
    spec:
      containers:
      - name: atlas-core
        image: uzo/atlas-core:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-core-service
  namespace: uzo-production
spec:
  selector:
    app: atlas-core
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
